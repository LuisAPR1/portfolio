{{ define "main" }}
<article>
  <h1 class="font-serif md:text-5xl lg:text-6xl font-bold text-foreground mb-6 leading-tight text-balance">{{ .Title }}</h1>
  {{ with or .Description .Params.description }}<p class="text-2xl text-gray-400 mb-10 leading-relaxed text-pretty">{{ . }}</p>{{ end }}
  <div class="flex flex-wrap items-center gap-6 pb-10 mb-10 border-b border-gray-500 w-full">
    <div class="flex items-center gap-3 custom">
      <div>
        <div class="custom">{{ or .Params.author site.Params.author }}</div>
        <div class="text-sm text-gray-400 custom">Author</div>
      </div>
    </div>
    <div class="flex items-center gap-6 text-sm text-gray-400 ml-auto custom">
      <div class="flex items-center gap-2 custom">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar-icon lucide-calendar"><path d="M8 2v4"/><path d="M16 2v4"/><rect width="18" height="18" x="3" y="4" rx="2"/><path d="M3 10h18"/></svg>
        <time class="custom" datetime="{{ .Date.Format "2006-01-02T15:04:05Z07:00" }}">{{ .Date.Format "January 2, 2006" }}</time>
      </div>
      {{ $rt := or .Params.reading_time (printf "%d minutes" .ReadingTime) }}
      <div class="flex items-center gap-2 custom">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentcolor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock"><path d="M12 6v6l4 2"/><circle cx="12" cy="12" r="10"/></svg>
        <span>{{ $rt }}</span>
      </div>
    </div>
  </div>
</article>
{{ .Content }}
{{ end }}
