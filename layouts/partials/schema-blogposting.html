<script type="application/ld+json">{"@context":"https://schema.org","@type":"BlogPosting","headline":{{ .Title | jsonify }},"description":{{ (or .Description .Params.description "") | jsonify }},"datePublished":{{ .Date.Format "2006-01-02T15:04:05-07:00" | jsonify }},"dateModified":{{ (or .Lastmod .Date | dateFormat "2006-01-02T15:04:05-07:00") | jsonify }},"url":{{ .Permalink | jsonify }},"inLanguage":"{{ site.LanguageCode }}","author":{"@type":"Person","name":"{{ site.Params.author }}"},"image":[{{ (or .Params.og_image .Params.cover_image site.Params.ogImage) | jsonify }}]}</script>
